runtime: php82
env: standard
instance_class: F1

automatic_scaling:
  max_instances: 1
  min_instances: 0

env_variables:
  # Database Config
  DB_SOCKET: "/cloudsql/YOUR_PROJECT:YOUR_REGION:YOUR_INSTANCE"
  DB_NAME: "YOUR_DB_NAME"
  DB_USER: "YOUR_DB_USER"
  DB_PASS: "SET_VIA_SECRET_MANAGER"
  DB_CHARSET: "utf8mb4"
  AUTO_CREATE_DATABASE: "false"
  AUTO_DB_SCHEMA_SYNC: "false"

  # Storage and API Config
  STORAGE_BUCKET: "YOUR_STORAGE_BUCKET"
  USE_CLOUD_STORAGE: "false"
  GOOGLE_MAPS_API_KEY: "SET_VIA_SECRET_MANAGER"
  PERMIT_CHECK_SCHEDULER_TOKEN: "SET_VIA_SECRET_MANAGER"
  SESSION_CLEANUP_SCHEDULER_TOKEN: "SET_VIA_SECRET_MANAGER"

  # Email Configuration
  EMAIL_SMTP_HOST: "smtp.gmail.com"
  EMAIL_SMTP_PORT: "465"
  EMAIL_SMTP_USERNAME: "YOUR_EMAIL_USERNAME"
  EMAIL_SMTP_PASSWORD: "SET_VIA_SECRET_MANAGER"
  EMAIL_SMTP_SECURE: "ssl"
  EMAIL_FROM_EMAIL: "YOUR_FROM_EMAIL"
  EMAIL_FROM_NAME: "CommunaLink Barangay System"

  # App Config
  APP_ENV: "production"
  APP_DEBUG: "false"
  SESSION_SAVE_PATH: "/tmp"